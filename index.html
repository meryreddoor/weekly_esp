<script src="https://cdn.tailwindcss.com"></script>

<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; background: #fafafa; }
  [contenteditable]:focus { outline: 2px solid rgba(15,23,42,0.12); outline-offset: 2px; border-radius: 4px; }

  }

  .fade-in { animation: fadeIn 0.3s ease-out; }

  @media print { .no-print { display: none !important; } }
  .hidden-soft { display: none; }
</style>
</head>
<body>

<div id="root"></div>

<script>
"use strict";

// ============================================================
// CONFIG
// ============================================================
var PASSWORD = "esphera_2026_Weekly";
var STORAGE_KEY = "wbr-esphera-v1";
var SESSION_KEY = "wbr-esphera-session";

var STATUS_CONFIG = {
  done:     { label: "Completado", emoji: "✅", color: "bg-emerald-50 text-emerald-700 border-emerald-200" },
  progress: { label: "En curso",   emoji: "🔄", color: "bg-amber-50 text-amber-700 border-amber-200" },
  blocked:  { label: "Bloqueado",  emoji: "🚫", color: "bg-rose-50 text-rose-700 border-rose-200" }
};

// ============================================================
// ICONS (inline SVG strings)
// ============================================================
var ICON = {
  plus:     '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>',
  trash:    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  chevUp:   '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>',
  chevDown: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>',
  print:    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>',
  lock:     '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'
};

// ============================================================
// HELPERS
// ============================================================
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return Array.prototype.slice.call(document.querySelectorAll(sel)); }

function escapeHTML(str) {
  return String(str == null ? "" : str).replace(/[&<>"']/g, function(m) {
    return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[m];
  });
}

function getWeekNumber() {
  var d = new Date();
  var yearStart = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - yearStart) / 86400000 + yearStart.getDay() + 1) / 7);
}

function uid(prefix) {
  return prefix + "_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6);
}

// ============================================================
// DEFAULT DATA
// ============================================================
function defaultData() {
  return {
    weekLabel: "Semana " + getWeekNumber() + " · " + new Date().toLocaleDateString('es-ES', { day: '2-digit', month: 'long', year: 'numeric' }),
    author: "Tu nombre",
    manifesto: "Que el reporting no te pare. Menos repetición, más criterio.",
    kpis: [
      { id: "k1", label: "MRR", value: "€48,200", delta: "+12%", trend: "up" },
      { id: "k2", label: "Clientes activos", value: "127", delta: "+8", trend: "up" },
      { id: "k3", label: "Churn mensual", value: "1.8%", delta: "-0.4pp", trend: "up" },
      { id: "k4", label: "NPS", value: "62", delta: "+5", trend: "up" }
    ],
    sections: [
      {
        id: "s1", number: "01", title: "Resumen ejecutivo",
        content: "Semana sólida en comercial — cerrados 4 contratos clave (incluido el primer cliente enterprise). Producto avanza según roadmap; pendiente desbloquear integración con A3 antes del jueves para no impactar el pipeline.",
        items: []
      },
      {
        id: "s2", number: "02", title: "Comercial",
        content: "Pipeline en €312k (vs €280k semana anterior). Foco en cuentas Tier 1.",
        items: [
          { id: "i1", status: "done", text: "4 contratos firmados (Distribuciones López, Construcciones Bilbao, Logística Mar, Talleres Norte)" },
          { id: "i2", status: "progress", text: "Demo CEGID con prospect Tier 1 — pendiente de feedback comercial" },
          { id: "i3", status: "blocked", text: "Acceso a base de datos A3 sigue bloqueado por Salvador Marco" }
        ]
      },
      {
        id: "s3", number: "03", title: "Producto y tecnología",
        content: "Sprint 12 cerrado al 92%. Foco siguiente sprint: motor de extracción IVA y panel multicliente.",
        items: [
          { id: "i4", status: "done", text: "Estados de pago añadidos a la interfaz" },
          { id: "i5", status: "done", text: "Campo teléfono añadido al formulario de demo" },
          { id: "i6", status: "progress", text: "Exportación de datos de empresa a CSV/Excel — entrega prevista lunes" }
        ]
      },
      {
        id: "s4", number: "04", title: "Operaciones y equipo",
        content: "Equipo en 14 personas. Onboarding de 2 nuevos KAM esta semana.",
        items: [
          { id: "i7", status: "done", text: "Plantilla CODIR enviada por Álvaro a Andrés" },
          { id: "i8", status: "progress", text: "Migración de Scribe a Esphera Academy en preparación" }
        ]
      },
      {
        id: "s5", number: "05", title: "Riesgos y próximos pasos",
        content: "Foco de la próxima semana en cerrar bloqueante A3 y publicar v2.4 del producto.",
        items: [
          { id: "i9", status: "blocked", text: "Bloqueante A3: escalar a Salvador Marco antes del miércoles" },
          { id: "i10", status: "progress", text: "Preparar deck para CODIR del viernes" }
        ]
      }
    ]
  };
}

// ============================================================
// STATE
// ============================================================
var state;
try {
  var raw = localStorage.getItem(STORAGE_KEY);
  state = raw ? JSON.parse(raw) : defaultData();
} catch (e) { state = defaultData(); }

var saveTimer = null;
function save() {
  setSaveStatus(false);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    setSaveStatus(true);
  }, 600);
}

function setSaveStatus(saved) {
  var el = document.getElementById('save-status');
  if (!el) return;
  if (saved) {
    el.innerHTML = '<div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div><span>Guardado</span>';
  } else {
    el.innerHTML = '<div class="w-1.5 h-1.5 rounded-full bg-amber-500 pulse-dot"></div><span>Guardando…</span>';
  }
}

// Path-based state setter: e.g. setStateAt("kpis.0.label", "MRR")
function setStateAt(path, value) {
  var parts = path.split('.');
  var target = state;
  for (var i = 0; i < parts.length - 1; i++) {
    var key = isNaN(parts[i]) ? parts[i] : parseInt(parts[i]);
    target = target[key];
  }
  var lastKey = isNaN(parts[parts.length - 1]) ? parts[parts.length - 1] : parseInt(parts[parts.length - 1]);
  target[lastKey] = value;
  save();
}

// ============================================================
// AUTH (memory-first, localStorage as backup)
// ============================================================
var memSession = false;

function isAuthed() {
  if (memSession) return true;
  try {
    var s = localStorage.getItem(SESSION_KEY);
    if (!s) return false;
    var parsed = JSON.parse(s);
    var valid = Date.now() - parsed.ts < 30 * 24 * 60 * 60 * 1000;
    if (valid) memSession = true;
    return valid;
  } catch (e) { return false; }
}

function authenticate(pwd) {
  if (String(pwd || "").trim() !== PASSWORD) return false;
  memSession = true;
  try { localStorage.setItem(SESSION_KEY, JSON.stringify({ ts: Date.now() })); } catch (e) {}
  return true;
}

function logout() {
  memSession = false;
  try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
  renderRoot();
}

// ============================================================
// RENDER: LOGIN
// ============================================================
function renderLogin() {
  $('#root').innerHTML =
    '<div class="min-h-screen grid-bg flex items-center justify-center p-6">' +
      '<div class="w-full max-w-md fade-in">' +
        '<div class="flex items-center gap-2 mb-12">' +
          '<div class="w-2.5 h-2.5 rounded-full bg-slate-900"></div>' +
          '<span class="text-sm font-medium text-slate-900 tracking-tight lowercase">esphera</span>' +
          '<span class="text-xs text-slate-400 tracking-tight">.ai</span>' +
        '</div>' +
        '<div class="text-[11px] text-slate-400 uppercase tracking-[0.2em] mb-3">00 · Acceso</div>' +
        '<h1 class="text-3xl font-semibold text-slate-900 tracking-tight mb-2">Weekly Business Review</h1>' +
        '<p class="text-slate-500 text-sm mb-10 leading-relaxed">Que el reporting no te pare.<br/>Menos repetición, más criterio.</p>' +
        '<form id="login-form" class="space-y-4">' +
          '<div>' +
            '<label class="text-[11px] text-slate-500 uppercase tracking-widest mb-2 block">Contraseña del equipo</label>' +
            '<div class="relative">' +
              '<div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">' + ICON.lock + '</div>' +
              '<input id="login-input" type="password" class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-lg text-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900/10 transition-all" placeholder="••••••••••••" />' +
            '</div>' +
            '<div id="login-error" class="hidden-soft items-center gap-1.5 mt-2 text-xs text-rose-600">' +
              '<div class="w-1.5 h-1.5 rounded-full bg-rose-500 pulse-dot"></div>' +
              'Contraseña incorrecta' +
            '</div>' +
          '</div>' +
          '<button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-3 rounded-lg text-sm font-medium tracking-tight transition-colors">Entrar</button>' +
        '</form>' +
        '<div class="mt-12 pt-6 border-t border-slate-100 flex items-center justify-between text-[10px] text-slate-400 uppercase tracking-widest">' +
          '<span>Dashboard interno</span>' +
          '<a href="https://esphera.ai" target="_blank" rel="noopener noreferrer" class="hover:text-slate-700 transition-colors">esphera.ai ↗</a>' +
        '</div>' +
      '</div>' +
    '</div>';

  setTimeout(function() {
    var input = $('#login-input');
    if (input) input.focus();
  }, 50);

  $('#login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var pwd = $('#login-input').value;
    if (authenticate(pwd)) {
      renderRoot();
    } else {
      var err = $('#login-error');
      var input = $('#login-input');
      err.classList.remove('hidden-soft');
      err.classList.add('flex');
      input.classList.add('border-rose-300');
      input.classList.remove('border-slate-200');
      setTimeout(function() {
        err.classList.add('hidden-soft');
        err.classList.remove('flex');
        input.classList.remove('border-rose-300');
        input.classList.add('border-slate-200');
      }, 2000);
    }
  });
}

// ============================================================
// RENDER: DASHBOARD PARTS
// ============================================================
function renderKpiCard(kpi, idx) {
  var trendColor = kpi.trend === "up" ? "text-emerald-600" : "text-rose-600";
  var trendIcon = kpi.trend === "up" ? ICON.chevUp : ICON.chevDown;
  return '' +
    '<div class="group relative bg-white border border-slate-200 rounded-xl p-5 hover:shadow-sm transition-shadow">' +
      '<button data-action="delete-kpi" data-idx="' + idx + '" class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 transition-all no-print" title="Eliminar KPI">' + ICON.trash + '</button>' +
      '<div class="text-[10px] uppercase tracking-widest text-slate-400 mb-2"><span contenteditable="true" data-edit="kpis.' + idx + '.label" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(kpi.label) + '</span></div>' +
      '<div class="text-2xl font-semibold text-slate-900 tracking-tight mb-1"><span contenteditable="true" data-edit="kpis.' + idx + '.value" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(kpi.value) + '</span></div>' +
      '<div class="flex items-center gap-1.5 text-xs">' +
        '<button data-action="toggle-trend" data-idx="' + idx + '" class="' + trendColor + ' no-print">' + trendIcon + '</button>' +
        '<span class="' + trendColor + '"><span contenteditable="true" data-edit="kpis.' + idx + '.delta" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(kpi.delta) + '</span></span>' +
        '<span class="text-slate-400">vs sem. anterior</span>' +
      '</div>' +
    '</div>';
}

function renderKpiGrid() {
  return state.kpis.map(renderKpiCard).join('');
}

function renderItem(item, sIdx, iIdx) {
  var cfg = STATUS_CONFIG[item.status] || STATUS_CONFIG.progress;
  var optionHTML = ['done','progress','blocked'].map(function(k) {
    var c = STATUS_CONFIG[k];
    var sel = item.status === k ? ' selected' : '';
    return '<option value="' + k + '"' + sel + '">' + c.emoji + ' ' + c.label + '</option>';
  }).join('');
  return '' +
    '<li data-section-idx="' + sIdx + '" data-item-idx="' + iIdx + '" class="group/item flex items-start gap-3 py-2 border-b border-slate-100 last:border-0">' +
      '<select data-action="status-change" data-section-idx="' + sIdx + '" data-item-idx="' + iIdx + '" class="text-xs px-2 py-1 rounded-md border ' + cfg.color + ' font-medium cursor-pointer focus:outline-none mt-0.5 no-print" style="appearance:none;-webkit-appearance:none;">' + optionHTML + '</select>' +
      '<span class="text-xs px-2 py-1 rounded-md border ' + cfg.color + ' font-medium hidden print:inline-block mt-0.5">' + cfg.emoji + ' ' + cfg.label + '</span>' +
      '<p class="flex-1 text-sm text-slate-700 leading-relaxed pt-1"><span contenteditable="true" data-edit="sections.' + sIdx + '.items.' + iIdx + '.text" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(item.text) + '</span></p>' +
      '<button data-action="delete-item" data-section-idx="' + sIdx + '" data-item-idx="' + iIdx + '" class="opacity-0 group-hover/item:opacity-100 text-slate-300 hover:text-rose-500 transition-all mt-1.5 no-print" title="Eliminar">' + ICON.trash + '</button>' +
    '</li>';
}

function renderSection(section, idx) {
  var itemsHTML = section.items.length === 0 ? '' :
    '<ul class="space-y-2" id="section-' + section.id + '-items">' +
      section.items.map(function(item, i) { return renderItem(item, idx, i); }).join('') +
    '</ul>';

  return '' +
    '<section class="group/sec mb-12 fade-in">' +
      '<div class="flex items-baseline gap-3 mb-4">' +
        '<span class="text-[11px] text-slate-400 uppercase tracking-[0.2em] font-medium"><span contenteditable="true" data-edit="sections.' + idx + '.number" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(section.number) + '</span></span>' +
        '<h2 class="text-xl font-semibold text-slate-900 tracking-tight flex-1"><span contenteditable="true" data-edit="sections.' + idx + '.title" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(section.title) + '</span></h2>' +
        '<button data-action="delete-section" data-idx="' + idx + '" class="opacity-0 group-hover/sec:opacity-100 text-slate-300 hover:text-rose-500 transition-all no-print" title="Eliminar sección">' + ICON.trash + '</button>' +
      '</div>' +
      '<div class="text-slate-600 text-sm leading-relaxed mb-5"><p contenteditable="true" data-edit="sections.' + idx + '.content" class="cursor-text px-1 -mx-1">' + escapeHTML(section.content) + '</p></div>' +
      itemsHTML +
      '<button data-action="add-item" data-idx="' + idx + '" class="mt-3 text-xs text-slate-500 hover:text-slate-900 flex items-center gap-1.5 transition-colors no-print">' + ICON.plus + ' Añadir punto</button>' +
    '</section>';
}

function renderSectionsList() {
  return state.sections.map(renderSection).join('');
}

// ============================================================
// RENDER: DASHBOARD
// ============================================================

  $('#root').innerHTML =

      // HEADER
      '<header class="sticky top-0 z-20 bg-white/80 backdrop-blur-md border-b border-slate-200 no-print">' +
        '<div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">' +

            '</div>' +
          '</div>' +
          '<div class="flex items-center gap-2">' +
            '<div id="save-status" class="hidden sm:flex items-center gap-1.5 text-[10px] uppercase tracking-widest text-slate-400 mr-2">' +
              '<div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div><span>Guardado</span>' +
            '</div>' +
            '<button data-action="print" class="flex items-center gap-1.5 text-xs px-3 py-1.5 bg-slate-900 hover:bg-slate-800 text-white rounded-md transition-colors">' + ICON.print + '<span class="hidden sm:inline">Exportar PDF</span></button>' +

        '</div>' +
      '</header>' +

      '<div class="max-w-5xl mx-auto px-6 pt-16 pb-8 fade-in">' +
        '<div class="text-[11px] text-slate-400 uppercase tracking-[0.2em] mb-3"><span contenteditable="true" data-edit="weekLabel" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(state.weekLabel) + '</span></div>' +
        '<h1 class="text-5xl md:text-6xl font-semibold text-slate-900 tracking-tight leading-[1.05] mb-4">Weekly <em class="font-serif italic text-slate-700">Business</em> Review</h1>' +
        '<p class="text-base text-slate-500 leading-relaxed max-w-2xl"><span contenteditable="true" data-edit="manifesto" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(state.manifesto) + '</span></p>' +
      '</div>' +

      // KPIS

        '<div class="flex items-baseline gap-3 mb-4">' +
          '<span class="text-[11px] text-slate-400 uppercase tracking-[0.2em] font-medium">KPI</span>' +

        '<button data-action="add-kpi" class="mt-3 text-xs text-slate-500 hover:text-slate-900 flex items-center gap-1.5 transition-colors no-print">' + ICON.plus + ' Añadir KPI</button>' +

        renderSectionsList() +

}

function rerenderKpis() { var el = $('#kpi-grid'); if (el) el.innerHTML = renderKpiGrid(); }
function rerenderSections() { var el = $('#sections-list'); if (!el) return; el.innerHTML = renderSectionsList() + '<button data-action="add-section" class="mt-4 w-full py-4 border border-dashed border-slate-200 hover:border-slate-300 rounded-lg text-sm text-slate-400 hover:text-slate-700 flex items-center justify-center gap-2 transition-colors no-print">' + ICON.plus + ' Añadir sección</button>'; }

// ============================================================
// ACTIONS
// ============================================================
function deleteKpi(idx)     { state.kpis.splice(idx, 1); save(); rerenderKpis(); }
function addKpi()           { state.kpis.push({ id: uid("k"), label: "Nuevo KPI", value: "0", delta: "+0%", trend: "up" }); save(); rerenderKpis(); }
function toggleTrend(idx)   { state.kpis[idx].trend = state.kpis[idx].trend === "up" ? "down" : "up"; save(); rerenderKpis(); }
function deleteSection(idx) { state.sections.splice(idx, 1); save(); rerenderSections(); }
function addSection()       {
  var n = String(state.sections.length + 1).padStart(2, "0");
  state.sections.push({ id: uid("s"), number: n, title: "Nueva sección", content: "Descripción…", items: [] });
  save(); rerenderSections();
}
function addItem(sIdx)              { state.sections[sIdx].items.push({ id: uid("i"), status: "progress", text: "Nuevo punto…" }); save(); rerenderSections(); }
function deleteItem(sIdx, iIdx)     { state.sections[sIdx].items.splice(iIdx, 1); save(); rerenderSections(); }
function changeStatus(sIdx, iIdx, v){ state.sections[sIdx].items[iIdx].status = v; save(); rerenderSections(); }

function resetAll() {
  if (!confirm("¿Restablecer a los datos por defecto? Esta acción no se puede deshacer.")) return;
  state = defaultData();
  save();
  renderDashboard();
  attachDashboardEvents();
}

// ============================================================
// EVENT DELEGATION (only attached once per dashboard render)
// ============================================================
function attachDashboardEvents() {
  var root = $('#root');

  root.addEventListener('click', function(e) {
    var btn = e.target.closest('[data-action]');
    if (!btn) return;
    var action = btn.dataset.action;
    var idx = parseInt(btn.dataset.idx);
    var sIdx = parseInt(btn.dataset.sectionIdx);
    var iIdx = parseInt(btn.dataset.itemIdx);

    switch (action) {
      case 'delete-kpi':     deleteKpi(idx); break;
      case 'add-kpi':        addKpi(); break;
      case 'toggle-trend':   toggleTrend(idx); break;
      case 'delete-section': deleteSection(idx); break;
      case 'add-section':    addSection(); break;
      case 'add-item':       addItem(idx); break;
      case 'delete-item':    deleteItem(sIdx, iIdx); break;
      case 'print':          window.print(); break;
      case 'logout':         logout(); break;
      case 'reset':          resetAll(); break;
    }
  });

  root.addEventListener('change', function(e) {
    var sel = e.target.closest('[data-action="status-change"]');
    if (!sel) return;
    changeStatus(parseInt(sel.dataset.sectionIdx), parseInt(sel.dataset.itemIdx), sel.value);
  });

  // ContentEditable: update state on blur (no re-render to preserve focus)
  root.addEventListener('blur', function(e) {
    var el = e.target.closest('[data-edit]');
    if (!el) return;
    var path = el.dataset.edit;
    var value = el.innerText.trim();
    setStateAt(path, value);
  }, true);

  // Prevent Enter from creating new lines in single-line edits
  root.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.matches('[data-edit]') && e.target.tagName === 'SPAN') {
      e.preventDefault();
      e.target.blur();
    }
  });
}

// ============================================================
// ROOT
// ============================================================
function renderRoot() {
  if (!isAuthed()) {
    renderLogin();
  } else {
    renderDashboard();
    attachDashboardEvents();
  }
}

// Mark as loaded so error overlay doesn't trigger
window.__appLoaded = true;
renderRoot();
</script>
</body>
</html>
