function getWeekNumber() {

// ============================================================
// STATE
// ============================================================
var state;
try {
  var raw = localStorage.getItem(STORAGE_KEY);
  state = (raw && JSON.parse(raw)) || defaultData();
  if (!state.departments) state = defaultData();
} catch (e) { state = defaultData(); }

var saveTimer = null;
function save() {
  setSaveStatus(false);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    setSaveStatus(true);
  }, 600);
}

function setSaveStatus(saved) {
  var el = $('#save-status');
  if (!el) return;
  el.innerHTML = saved
    ? '<div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div><span>Guardado</span>'
    : '<div class="w-1.5 h-1.5 rounded-full bg-amber-500 pulse-dot"></div><span>Guardando…</span>';
}

function setStateAt(path, value) {
  var parts = path.split('.');
  var target = state;
  for (var i = 0; i < parts.length - 1; i++) {
    var key = isNaN(parts[i]) ? parts[i] : parseInt(parts[i]);
    target = target[key];
  }
  var lastKey = isNaN(parts[parts.length - 1]) ? parts[parts.length - 1] : parseInt(parts[parts.length - 1]);
  target[lastKey] = value;
  save();
}

// ============================================================
// AUTH
// ============================================================
var memSession = false;
function isAuthed() {
  if (memSession) return true;
  try {
    var s = localStorage.getItem(SESSION_KEY);
    if (!s) return false;
    var parsed = JSON.parse(s);
    var valid = Date.now() - parsed.ts < 30 * 24 * 60 * 60 * 1000;
    if (valid) memSession = true;
    return valid;
  } catch (e) { return false; }
}
function authenticate(pwd) {
  if (String(pwd || "").trim() !== PASSWORD) return false;
  memSession = true;
  try { localStorage.setItem(SESSION_KEY, JSON.stringify({ ts: Date.now() })); } catch (e) {}
  return true;
}
function logout() {
  memSession = false;
  try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
  renderRoot();
}

        '<h1 class="text-3xl font-semibold text-slate-900 tracking-tight mb-2">Weekly Business Review</h1>' +
        '<p class="text-slate-500 text-sm mb-10 leading-relaxed">Que el reporting no te pare.<br/>Menos repetición, más criterio.</p>' +
        '<form id="login-form" class="space-y-4">' +
          '<div>' +
            '<label class="text-[11px] text-slate-500 uppercase tracking-widest mb-2 block">Contraseña del equipo</label>' +
            '<div class="relative">' +
              '<div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">' + ICON.lock + '</div>' +
              '<input id="login-input" type="password" class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-lg text-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900/10 transition-all" placeholder="••••••••••••" autocomplete="current-password" />' +
            '</div>' +
            '<div id="login-error" class="hidden-soft items-center gap-1.5 mt-2 text-xs text-rose-600">' +
              '<div class="w-1.5 h-1.5 rounded-full bg-rose-500 pulse-dot"></div>Contraseña incorrecta' +
            '</div>' +
          '</div>' +
          '<button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-3 rounded-lg text-sm font-medium tracking-tight transition-colors">Entrar</button>' +
        '</form>' +
        '<div class="mt-12 pt-6 border-t border-slate-100 flex items-center justify-between text-[10px] text-slate-400 uppercase tracking-widest">' +
          '<span>Dashboard interno</span>' +
          '<a href="https://esphera.ai" target="_blank" rel="noopener noreferrer" class="hover:text-slate-700 transition-colors">esphera.ai ↗</a>' +
        '</div>' +
      '</div>' +
    '</div>';
  setTimeout(function(){ var i = $('#login-input'); if (i) i.focus(); }, 50);
  $('#login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var pwd = $('#login-input').value;
    if (authenticate(pwd)) {
      renderRoot();
    } else {
      var err = $('#login-error');
      var input = $('#login-input');
      err.classList.remove('hidden-soft'); err.classList.add('flex');
      input.classList.add('border-rose-300'); input.classList.remove('border-slate-200');
      setTimeout(function() {
        err.classList.add('hidden-soft'); err.classList.remove('flex');
        input.classList.remove('border-rose-300'); input.classList.add('border-slate-200');
      }, 2000);
    }
  });
}

  var trendColor = kpi.trend === "up" ? "text-emerald-600" : "text-rose-600";

  return '' +
    '<div class="group relative bg-white border border-slate-200 rounded-xl p-5 hover:shadow-sm transition-shadow">' +
      '<button data-action="delete-kpi" data-dept="' + dept + '" data-idx="' + idx + '" class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 transition-all no-print" title="Eliminar KPI">' + ICON.trash + '</button>' +
      '<div class="text-[10px] uppercase tracking-widest text-slate-400 mb-2"><span contenteditable="true" data-edit="' + prefix + '.label" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(kpi.label) + '</span></div>' +
      '<div class="text-2xl font-semibold text-slate-900 tracking-tight mb-1"><span contenteditable="true" data-edit="' + prefix + '.value" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(kpi.value) + '</span></div>' +
      '<div class="flex items-center gap-1.5 text-xs">' +
        '<button data-action="toggle-trend" data-dept="' + dept + '" data-idx="' + idx + '" class="' + trendColor + ' no-print">' + trendIcon + '</button>' +
        '<span class="' + trendColor + '"><span contenteditable="true" data-edit="' + prefix + '.delta" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(kpi.delta) + '</span></span>' +
        '<span class="text-slate-400">vs sem. anterior</span>' +
      '</div>' +
    '</div>';
}

function renderItem(item, sIdx, iIdx, dept) {
  var cfg = STATUS_CONFIG[item.status] || STATUS_CONFIG.progress;
  var optionHTML = ['done','progress','blocked'].map(function(k) {
    var c = STATUS_CONFIG[k];
    var sel = item.status === k ? ' selected' : '';
    return '<option value="' + k + '"' + sel + '>' + c.emoji + ' ' + c.label + '</option>';
  }).join('');
  var prefix = 'departments.' + dept + '.sections.' + sIdx + '.items.' + iIdx;
  return '' +
    '<li class="group/item flex items-start gap-3 py-2 border-b border-slate-100 last:border-0">' +
      '<select data-action="status-change" data-dept="' + dept + '" data-section-idx="' + sIdx + '" data-item-idx="' + iIdx + '" class="text-xs px-2 py-1 rounded-md border ' + cfg.color + ' font-medium cursor-pointer focus:outline-none mt-0.5 no-print" style="appearance:none;-webkit-appearance:none;">' + optionHTML + '</select>' +
      '<span class="text-xs px-2 py-1 rounded-md border ' + cfg.color + ' font-medium hidden print:inline-block mt-0.5">' + cfg.emoji + ' ' + cfg.label + '</span>' +
      '<p class="flex-1 text-sm text-slate-700 leading-relaxed pt-1"><span contenteditable="true" data-edit="' + prefix + '.text" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(item.text) + '</span></p>' +
      '<button data-action="delete-item" data-dept="' + dept + '" data-section-idx="' + sIdx + '" data-item-idx="' + iIdx + '" class="opacity-0 group-hover/item:opacity-100 text-slate-300 hover:text-rose-500 transition-all mt-1.5 no-print" title="Eliminar">' + ICON.trash + '</button>' +
    '</li>';
}

        '<button data-action="delete-section" data-dept="' + dept + '" data-idx="' + idx + '" class="opacity-0 group-hover/sec:opacity-100 text-slate-300 hover:text-rose-500 transition-all no-print" title="Eliminar sección">' + ICON.trash + '</button>' +
      '</div>' +
      '<div class="text-slate-600 text-sm leading-relaxed mb-5"><p contenteditable="true" data-edit="' + prefix + '.content" class="cursor-text px-1 -mx-1">' + escapeHTML(section.content) + '</p></div>' +
      itemsHTML +
      '<button data-action="add-item" data-dept="' + dept + '" data-idx="' + idx + '" class="mt-3 text-xs text-slate-500 hover:text-slate-900 flex items-center gap-1.5 transition-colors no-print">' + ICON.plus + ' Añadir punto</button>' +
    '</section>';
}

function renderDeptInner(dept) {
  var d = state.departments[dept];
  var deptLabel = DEPT_LABELS[dept];
  return '' +
    '<div class="dept-print-title text-[11px] text-slate-400 uppercase tracking-[0.2em] mb-3 mt-8 pb-2 border-b border-slate-200">Departamento · ' + deptLabel + '</div>' +
    '<div class="max-w-5xl mx-auto px-6 py-6">' +
      '<div class="flex items-baseline gap-3 mb-4">' +
        '<span class="text-[11px] text-slate-400 uppercase tracking-[0.2em] font-medium">KPI</span>' +
        '<h2 class="text-sm font-medium text-slate-700 flex-1">Indicadores · ' + deptLabel + '</h2>' +
      '</div>' +
      '<div class="grid grid-cols-2 md:grid-cols-4 gap-3">' +
        d.kpis.map(function(kpi, i) { return renderKpiCard(kpi, i, dept); }).join('') +
      '</div>' +
      '<button data-action="add-kpi" data-dept="' + dept + '" class="mt-3 text-xs text-slate-500 hover:text-slate-900 flex items-center gap-1.5 transition-colors no-print">' + ICON.plus + ' Añadir KPI</button>' +
    '</div>' +
    '<main class="max-w-5xl mx-auto px-6 py-12">' +
      d.sections.map(function(s, i) { return renderSection(s, i, dept); }).join('') +
      '<button data-action="add-section" data-dept="' + dept + '" class="mt-4 w-full py-4 border border-dashed border-slate-200 hover:border-slate-300 rounded-lg text-sm text-slate-400 hover:text-slate-700 flex items-center justify-center gap-2 transition-colors no-print">' + ICON.plus + ' Añadir sección</button>' +
    '</main>';
}

// ============================================================
// RENDER: TABS + DEPT AREA
// ============================================================
function renderTabsInner() {
  return DEPARTMENTS.map(function(key, i) {
    var num = String(i + 1).padStart(2, '0');
    var label = DEPT_LABELS[key];
    var active = state.activeDept === key;
    var btnClass = 'flex items-baseline gap-2 py-4 -mb-px border-b-2 text-sm transition-colors whitespace-nowrap ' +
      (active ? 'border-slate-900 text-slate-900 font-medium' : 'border-transparent text-slate-500 hover:text-slate-900');
    return '<button data-action="set-tab" data-tab="' + key + '" class="' + btnClass + '">' +
      '<span class="text-[10px] text-slate-400 uppercase tracking-widest">' + num + '</span>' +
      '<span>' + label + '</span>' +
    '</button>';
  }).join('');
}

function renderDeptAreaInner() {
  return DEPARTMENTS.map(function(key) {
    var active = state.activeDept === key;
    return '<div class="dept-content ' + (active ? '' : 'hidden-soft') + '" data-dept="' + key + '">' + renderDeptInner(key) + '</div>';
  }).join('');
}

// ============================================================
// RENDER: DASHBOARD
// ============================================================
function renderDashboard() {
  $('#root').innerHTML =
    '<div class="min-h-screen bg-[#fafafa]">' +
      // HEADER
      '<header class="sticky top-0 z-20 bg-white/80 backdrop-blur-md border-b border-slate-200 no-print">' +
        '<div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">' +
          '<a href="https://esphera.ai" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 hover:opacity-70 transition-opacity">' +
            '<div class="w-2.5 h-2.5 rounded-full bg-slate-900"></div>' +
            '<span class="text-sm font-medium text-slate-900 tracking-tight lowercase">esphera</span>' +
            '<span class="text-xs text-slate-400 tracking-tight">.ai</span>' +
          '</a>' +
          '<div class="hidden md:flex items-center gap-3 text-xs text-slate-500">' +
            '<span class="text-slate-300">|</span><span>Weekly Review</span><span class="text-slate-300">|</span>' +
            '<div class="flex items-center gap-1.5">' +
              '<div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>' +
              '<span contenteditable="true" data-edit="author" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(state.author) + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="flex items-center gap-2">' +
            '<div id="save-status" class="hidden sm:flex items-center gap-1.5 text-[10px] uppercase tracking-widest text-slate-400 mr-2">' +
              '<div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div><span>Guardado</span>' +
            '</div>' +
            '<button data-action="print" class="flex items-center gap-1.5 text-xs px-3 py-1.5 bg-slate-900 hover:bg-slate-800 text-white rounded-md transition-colors">' + ICON.print + '<span class="hidden sm:inline">Exportar PDF</span></button>' +
            '<button data-action="logout" class="text-xs px-3 py-1.5 border border-slate-200 hover:border-slate-300 text-slate-500 hover:text-slate-900 rounded-md transition-colors">Salir</button>' +
          '</div>' +
        '</div>' +
      '</header>' +

      // COVER (global)
      '<div class="max-w-5xl mx-auto px-6 pt-16 pb-10 fade-in">' +
        '<div class="text-[11px] text-slate-400 uppercase tracking-[0.2em] mb-3"><span contenteditable="true" data-edit="weekLabel" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(state.weekLabel) + '</span></div>' +
        '<h1 class="text-5xl md:text-6xl font-semibold text-slate-900 tracking-tight leading-[1.05] mb-4">Weekly <em class="font-serif italic text-slate-700">Business</em> Review</h1>' +
        '<p class="text-base text-slate-500 leading-relaxed max-w-2xl"><span contenteditable="true" data-edit="manifesto" class="cursor-text px-1 -mx-1 inline-block">' + escapeHTML(state.manifesto) + '</span></p>' +
      '</div>' +

      // TABS
      '<div class="border-b border-slate-200 sticky top-[57px] bg-[#fafafa]/90 backdrop-blur-md z-10 no-print">' +
        '<div id="tab-nav" class="max-w-5xl mx-auto px-6 flex gap-8 overflow-x-auto">' + renderTabsInner() + '</div>' +
      '</div>' +

      // DEPT AREA (all depts rendered, only active visible on screen)
      '<div id="dept-area" class="fade-in">' + renderDeptAreaInner() + '</div>' +

      // FOOTER
      '<footer class="max-w-5xl mx-auto px-6 py-12 mt-8 border-t border-slate-100">' +
        '<div class="flex flex-wrap items-center justify-between gap-4 text-[10px] uppercase tracking-widest text-slate-400">' +
          '<div class="flex flex-wrap gap-6"><span>Edición en línea</span><span>4 áreas</span><span>Auto-guardado</span><span>Print: todas las áreas</span></div>' +
          '<div class="flex items-center gap-4">' +
            '<button data-action="reset" class="hover:text-rose-500 transition-colors no-print">Restablecer</button>' +
            '<a href="https://esphera.ai" target="_blank" rel="noopener noreferrer" class="hover:text-slate-700 transition-colors">esphera.ai ↗</a>' +
          '</div>' +
        '</div>' +
      '</footer>' +
    '</div>';
}

function rerenderDept(dept) {
  var el = document.querySelector('.dept-content[data-dept="' + dept + '"]');
  if (el) el.innerHTML = renderDeptInner(dept);
}

function rerenderTabs() {
  var el = $('#tab-nav');
  if (el) el.innerHTML = renderTabsInner();
}

function setActiveDept(key) {
  state.activeDept = key;
  save();
  rerenderTabs();
  $$('.dept-content').forEach(function(el) {
    if (el.dataset.dept === key) el.classList.remove('hidden-soft');
    else el.classList.add('hidden-soft');
  });
  // Scroll to top of dept area
  var area = $('#dept-area');
  if (area) area.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ============================================================
// ACTIONS
// ============================================================
function deleteKpi(dept, idx)        { state.departments[dept].kpis.splice(idx, 1); save(); rerenderDept(dept); }
function addKpi(dept)                { state.departments[dept].kpis.push({ id: uid("k"), label: "Nuevo KPI", value: "0", delta: "+0%", trend: "up" }); save(); rerenderDept(dept); }
function toggleTrend(dept, idx)      { var k = state.departments[dept].kpis[idx]; k.trend = k.trend === "up" ? "down" : "up"; save(); rerenderDept(dept); }
function deleteSection(dept, idx)    { state.departments[dept].sections.splice(idx, 1); save(); rerenderDept(dept); }
function addSection(dept)            {
  var n = String(state.departments[dept].sections.length + 1).padStart(2, "0");
  state.departments[dept].sections.push({ id: uid("s"), number: n, title: "Nueva sección", content: "Descripción…", items: [] });
  save(); rerenderDept(dept);
}
function addItem(dept, sIdx)         { state.departments[dept].sections[sIdx].items.push({ id: uid("i"), status: "progress", text: "Nuevo punto…" }); save(); rerenderDept(dept); }
function deleteItem(dept, sIdx, iIdx){ state.departments[dept].sections[sIdx].items.splice(iIdx, 1); save(); rerenderDept(dept); }
function changeStatus(dept, sIdx, iIdx, v) { state.departments[dept].sections[sIdx].items[iIdx].status = v; save(); rerenderDept(dept); }

function resetAll() {
  if (!confirm("¿Restablecer todos los datos al estado por defecto? Esta acción no se puede deshacer.")) return;
  state = defaultData();
  save();
  renderDashboard();
}

// ============================================================
// EVENT DELEGATION
// ============================================================
var eventsAttached = false;
function attachEvents() {
  if (eventsAttached) return;
  eventsAttached = true;
  var root = $('#root');

  root.addEventListener('click', function(e) {
    var btn = e.target.closest('[data-action]');
    if (!btn || btn.tagName === 'SELECT') return;
    var action = btn.dataset.action;
    var dept = btn.dataset.dept;
    var idx = parseInt(btn.dataset.idx);
    var sIdx = parseInt(btn.dataset.sectionIdx);
    var iIdx = parseInt(btn.dataset.itemIdx);

    switch (action) {
      case 'set-tab':        setActiveDept(btn.dataset.tab); break;
      case 'delete-kpi':     deleteKpi(dept, idx); break;
      case 'add-kpi':        addKpi(dept); break;
      case 'toggle-trend':   toggleTrend(dept, idx); break;
      case 'delete-section': deleteSection(dept, idx); break;
      case 'add-section':    addSection(dept); break;
      case 'add-item':       addItem(dept, idx); break;
      case 'delete-item':    deleteItem(dept, sIdx, iIdx); break;
      case 'print':          window.print(); break;
      case 'logout':         logout(); break;
      case 'reset':          resetAll(); break;
    }
  });

  root.addEventListener('change', function(e) {
    var sel = e.target.closest('[data-action="status-change"]');
    if (!sel) return;
    changeStatus(sel.dataset.dept, parseInt(sel.dataset.sectionIdx), parseInt(sel.dataset.itemIdx), sel.value);
  });

  root.addEventListener('blur', function(e) {
    var el = e.target.closest('[data-edit]');
    if (!el) return;
    setStateAt(el.dataset.edit, el.innerText.trim());
  }, true);

  root.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.matches && e.target.matches('span[data-edit]')) {
      e.preventDefault();
      e.target.blur();
    }
  });
}

// ============================================================
// ROOT
// ============================================================
function renderRoot() {
  if (!isAuthed()) {
    renderLogin();
  } else {
    renderDashboard();
    attachEvents();
  }
}

window.__appLoaded = true;
renderRoot();
</script>
