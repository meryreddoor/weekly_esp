function migrateState(s) {
  if (!s || !s.departments) return s;
  // Añadir funnel a ventas si falta
  if (s.departments.ventas && !s.departments.ventas.funnel) {
    s.departments.ventas.funnel = {
      stages: [
        { id: uid("f"), name: "Demo solicitada",   volume: 100 },
        { id: uid("f"), name: "Demo realizada",    volume: 35 },
        { id: uid("f"), name: "Propuesta enviada", volume: 26 },
        { id: uid("f"), name: "Negociación",       volume: 14 },
        { id: uid("f"), name: "Cerrado ganado",    volume: 13 }
      ],
      totalValue: "€37.8K"
    };
  }
  return s;
}

var state;
try {
  var raw = localStorage.getItem(STORAGE_KEY);
  state = (raw && JSON.parse(raw)) || defaultData();
  if (!state.departments || !state.deptOrder) state = defaultData();
  state = migrateState(state);
  // Persistir migración
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
} catch (e) { state = defaultData(); }

var saveTimer = null;
function save() {
  setSaveStatus(false);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    setSaveStatus(true);
  }, 600);
}

function setSaveStatus(saved) {
  var el = $('#save-status');
  if (!el) return;
  el.innerHTML = saved
    ? '<div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div><span>Guardado</span>'
    : '<div class="w-1.5 h-1.5 rounded-full bg-amber-500 pulse-dot"></div><span>Guardando…</span>';
}

function setStateAt(path, value) {
  var parts = path.split('.');
  var target = state;
  for (var i = 0; i < parts.length - 1; i++) {
    var key = isNaN(parts[i]) ? parts[i] : parseInt(parts[i]);
    target = target[key];
  }
  var lastKey = isNaN(parts[parts.length - 1]) ? parts[parts.length - 1] : parseInt(parts[parts.length - 1]);
  target[lastKey] = value;
  save();
}

// AUTH
// ============================================================
var memSession = false;
function isAuthed() {
  if (memSession) return true;
  try {
    var s = localStorage.getItem(SESSION_KEY);
    if (!s) return false;
    var parsed = JSON.parse(s);
    var valid = Date.now() - parsed.ts < 30 * 24 * 60 * 60 * 1000;
    if (valid) memSession = true;
    return valid;
  } catch (e) { return false; }
}
function authenticate(pwd) {
  var clean = String(pwd || "").trim().toLowerCase().replace(/\s+/g, "");
  if (clean !== PASSWORD.toLowerCase()) return false;
  memSession = true;
  try { localStorage.setItem(SESSION_KEY, JSON.stringify({ ts: Date.now() })); } catch (e) {}
  return true;
}
function logout() {
  memSession = false;
  try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
  renderRoot();
}

// ============================================================
// DRAG & DROP
// ============================================================
var dragInfo = null;
var lastDropTarget = null;
var lastDropPos = null;

function clearAllDropIndicators() {
  $$('.drop-above, .drop-below, .drop-left, .drop-right').forEach(function(el) {
    el.classList.remove('drop-above', 'drop-below', 'drop-left', 'drop-right');
  });
}

function dragStart(e) {
  var item = e.target.closest('[data-drag-type]');
  if (!item) return;
  if (e.target.closest('[contenteditable="true"]')) {
    e.preventDefault();
    return;
  }
  dragInfo = {
    type: item.dataset.dragType,
    dept: item.dataset.dept || null,
    idx: item.dataset.dragIdx != null ? parseInt(item.dataset.dragIdx) : null,
    sIdx: item.dataset.dragSIdx != null ? parseInt(item.dataset.dragSIdx) : null,
    iIdx: item.dataset.dragIIdx != null ? parseInt(item.dataset.dragIIdx) : null,
    key: item.dataset.dragKey || null
  };
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', dragInfo.type); } catch (err) {}
  setTimeout(function() { item.classList.add('dragging'); }, 0);
}

function dragOver(e) {
  if (!dragInfo) return;
  var item = e.target.closest('[data-drag-type="' + dragInfo.type + '"]');
  if (!item) return;
  if (item.classList.contains('dragging')) return;
  if (dragInfo.type !== 'tab' && item.dataset.dept !== dragInfo.dept) return;
  if (dragInfo.type === 'item' && parseInt(item.dataset.dragSIdx) !== dragInfo.sIdx) return;

  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';

  var rect = item.getBoundingClientRect();
  var horizontal = dragInfo.type === 'tab';
  var pos = horizontal
    ? (e.clientX < (rect.left + rect.width / 2) ? 'left' : 'right')
    : (e.clientY < (rect.top + rect.height / 2) ? 'above' : 'below');

  if (lastDropTarget !== item || lastDropPos !== pos) {
    if (lastDropTarget) lastDropTarget.classList.remove('drop-above','drop-below','drop-left','drop-right');
    item.classList.add('drop-' + pos);
    lastDropTarget = item;
    lastDropPos = pos;
  }
}

function dropHandler(e) {
  if (!dragInfo || !lastDropTarget) { dragEnd(); return; }
  e.preventDefault();
  var target = lastDropTarget;
  var pos = lastDropPos;

  switch (dragInfo.type) {
    case 'tab':           reorderTabs(dragInfo.key, target.dataset.dragKey, pos); break;
    case 'kpi':           reorderKpis(dragInfo.dept, dragInfo.idx, parseInt(target.dataset.dragIdx), pos); break;
    case 'section':       reorderSections(dragInfo.dept, dragInfo.idx, parseInt(target.dataset.dragIdx), pos); break;
    case 'item':          reorderItems(dragInfo.dept, dragInfo.sIdx, dragInfo.iIdx, parseInt(target.dataset.dragIIdx), pos); break;
    case 'funnel-stage':  reorderFunnelStages(dragInfo.dept, dragInfo.idx, parseInt(target.dataset.dragIdx), pos); break;
  }
  dragEnd();
}

function dragEnd() {
  $$('.dragging').forEach(function(el) { el.classList.remove('dragging'); });
  clearAllDropIndicators();
  dragInfo = null;
  lastDropTarget = null;
  lastDropPos = null;
}

function reorderArrayMove(arr, fromIdx, toIdx, pos) {
  if (fromIdx === toIdx) return;
  var item = arr[fromIdx];
  arr.splice(fromIdx, 1);
  if (pos === 'below' || pos === 'right') toIdx++;
  if (fromIdx < toIdx) toIdx--;
  arr.splice(toIdx, 0, item);
}

function reorderTabs(srcKey, targetKey, pos) {
  if (srcKey === targetKey) return;
  var fromIdx = state.deptOrder.indexOf(srcKey);
  var toIdx = state.deptOrder.indexOf(targetKey);
  reorderArrayMove(state.deptOrder, fromIdx, toIdx, pos);
  state.deptOrder.forEach(function(key, i) { state.departments[key].number = pad2(i + 1); });
  save();
  rerenderTabs();
}

function reorderKpis(dept, fromIdx, toIdx, pos) {
  reorderArrayMove(state.departments[dept].kpis, fromIdx, toIdx, pos);
  save();
  rerenderDept(dept);
}

function reorderSections(dept, fromIdx, toIdx, pos) {
  reorderArrayMove(state.departments[dept].sections, fromIdx, toIdx, pos);
  state.departments[dept].sections.forEach(function(s, i) { s.number = pad2(i + 1); });
  save();

              '<input id="login-input" type="password" class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-lg text-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900/10 transition-all" placeholder="esphera2026" autocomplete="off" />' +
            '</div>' +
            '<div class="text-[10px] text-slate-400 mt-1.5">Pista: <span class="font-mono text-slate-600">esphera2026</span></div>' +
            '<div id="login-error" class="hidden-soft items-center gap-1.5 mt-2 text-xs text-rose-600">' +
              '<div class="w-1.5 h-1.5 rounded-full bg-rose-500 pulse-dot"></div>Contraseña incorrecta' +
            '</div>' +
          '</div>' +
          '<button id="login-btn" type="button" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-3 rounded-lg text-sm font-medium tracking-tight transition-colors cursor-pointer">Entrar</button>' +
        '</form>' +
        '<div class="mt-12 pt-6 border-t border-slate-100 flex items-center justify-between text-[10px] text-slate-400 uppercase tracking-widest">' +
          '<span>Dashboard interno</span>' +
          '<a href="https://esphera.ai" target="_blank" rel="noopener noreferrer" class="hover:text-slate-700 transition-colors">esphera.ai ↗</a>' +
        '</div>' +
      '</div>' +
    '</div>';

  setTimeout(function(){ var i = $('#login-input'); if (i) i.focus(); }, 50);

  var form = $('#login-form');
  var input = $('#login-input');
  var btn = $('#login-btn');
  var errEl = $('#login-error');

  function showLoginError() {
    if (errEl) { errEl.classList.remove('hidden-soft'); errEl.classList.add('flex'); }
    if (input) { input.classList.add('border-rose-300'); input.classList.remove('border-slate-200'); }
    setTimeout(function() {
      if (errEl) { errEl.classList.add('hidden-soft'); errEl.classList.remove('flex'); }
      if (input) { input.classList.remove('border-rose-300'); input.classList.add('border-slate-200'); }
    }, 2200);
  }

  function tryLogin(e) {
    if (e && e.preventDefault) e.preventDefault();
    if (!input) return;
    var pwd = input.value;
    if (btn) { btn.textContent = "Verificando…"; btn.disabled = true; }
    try {
      if (authenticate(pwd)) {
        try { renderRoot(); }
        catch (renderErr) {
          document.body.innerHTML = '<div style="padding:40px;font-family:monospace;color:#991b1b;background:#fef2f2;min-height:100vh;"><h2 style="font-size:18px;margin-bottom:16px;">Error al renderizar el dashboard</h2><pre style="background:#fff;padding:16px;border-radius:8px;font-size:12px;overflow:auto;white-space:pre-wrap;">' + (renderErr.message || renderErr) + '\n\n' + (renderErr.stack || '') + '</pre></div>';
        }
      } else {
        if (btn) { btn.textContent = "Entrar"; btn.disabled = false; }
        showLoginError();
      }
    } catch (authErr) {
      if (btn) { btn.textContent = "Entrar"; btn.disabled = false; }
    }
  }

  if (form) form.addEventListener('submit', tryLogin);
  if (btn)  btn.addEventListener('click', tryLogin);
  if (input) {
    input.addEventListener('keypress', function(e) { if (e.key === 'Enter') tryLogin(e); });
    input.addEventListener('keydown',  function(e) { if (e.key === 'Enter') tryLogin(e); });
  }
  window.__tryLogin = tryLogin;
}

function renderFunnel(dept) {
  var f = state.departments[dept].funnel;
  if (!f || !f.stages) return '';

  var first = f.stages[0];
  var last = f.stages[f.stages.length - 1];

  var rowsHTML = f.stages.map(function(stage, i) {
    var prev = i > 0 ? f.stages[i - 1] : null;
    var vsAnt = (i === 0) ? '—' : pct(stage.volume, prev.volume);
    var vsTop = (i === 0) ? '—' : pct(stage.volume, first.volume);
    var prefix = 'departments.' + dept + '.funnel.stages.' + i;

    return '' +
      '<div draggable="true" data-drag-type="funnel-stage" data-dept="' + dept + '" data-drag-idx="' + i + '" class="group/stage px-6 py-3 grid grid-cols-12 gap-4 items-center border-b border-slate-100 last:border-0">' +
        '<div class="col-span-6 flex items-center gap-2 -ml-1">' +
          '<span class="drag-handle no-print text-slate-400" title="Arrastrar etapa">' + ICON.grip + '</span>' +
          '<span contenteditable="true" data-edit="' + prefix + '.name" class="text-sm text-slate-700 cursor-text px-1 -mx-1 inline-block">' + escapeHTML(stage.name) + '</span>' +
        '</div>' +
        '<div class="col-span-2 text-right">' +
          '<span contenteditable="true" data-edit="' + prefix + '.volume" data-numeric="1" class="text-base font-semibold text-slate-900 cursor-text px-1 -mx-1 inline-block">' + escapeHTML(String(stage.volume)) + '</span>' +
        '</div>' +
        '<div class="col-span-2 text-right text-sm text-slate-400">' + vsAnt + '</div>' +
        '<div class="col-span-2 text-right flex items-center justify-end gap-2">' +
          '<span class="text-sm text-slate-400">' + vsTop + '</span>' +
          '<button data-action="delete-funnel-stage" data-dept="' + dept + '" data-idx="' + i + '" class="opacity-0 group-hover/stage:opacity-100 text-slate-300 hover:text-rose-500 transition-all no-print" title="Eliminar etapa">' + ICON.trash + '</button>' +
        '</div>' +
      '</div>';
  }).join('');

  var globalConv = first ? pct(last.volume, first.volume) : '—';

  return '' +
    '<div class="max-w-5xl mx-auto px-6 pt-2 pb-6">' +
      '<div class="flex items-center justify-between mb-3">' +
        '<h3 class="text-[11px] uppercase tracking-[0.2em] text-slate-400 font-medium">Pipeline comercial</h3>' +
        '<button data-action="add-funnel-stage" data-dept="' + dept + '" class="text-[11px] text-slate-400 hover:text-slate-900 transition-colors no-print">+ Añadir</button>' +
      '</div>' +
      '<div class="bg-white border border-slate-200 rounded-xl overflow-hidden">' +
        '<div class="px-6 py-2 grid grid-cols-12 gap-4 text-[10px] uppercase tracking-widest text-slate-400 border-b border-slate-200">' +
          '<div class="col-span-6">Etapa</div>' +
          '<div class="col-span-2 text-right">Vol.</div>' +
          '<div class="col-span-2 text-right">vs Ant.</div>' +
          '<div class="col-span-2 text-right">vs Top</div>' +
        '</div>' +
        rowsHTML +
        '<div class="px-6 py-3 grid grid-cols-12 gap-4 items-center border-t border-slate-200">' +
          '<div class="col-span-8 text-[11px] uppercase tracking-widest text-slate-400">Valor total pipeline</div>' +
          '<div class="col-span-4 text-right">' +
            '<span contenteditable="true" data-edit="departments.' + dept + '.funnel.totalValue" class="text-base font-semibold text-slate-900 cursor-text px-1 -mx-1 inline-block">' + escapeHTML(f.totalValue) + '</span>' +

          '<div class="col-span-4 text-right text-base font-semibold text-emerald-600">' + globalConv + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

            '<a href="https://esphera.ai" target="_blank" rel="noopener noreferrer" class="hover:text-slate-700 transition-colors">esphera.ai ↗</a>' +
          '</div>' +
        '</div>' +
      '</footer>' +
    '</div>';
}

function rerenderDept(dept) {
  var el = document.querySelector('.dept-content[data-dept="' + dept + '"]');
  if (el) el.innerHTML = renderDeptInner(dept);
}
function rerenderTabs() { var el = $('#tab-nav'); if (el) el.innerHTML = renderTabsInner(); }
function rerenderDeptArea() { var el = $('#dept-area'); if (el) el.innerHTML = renderDeptAreaInner(); }

function setActiveDept(key) {
  state.activeDept = key;
  save();
  rerenderTabs();
  $$('.dept-content').forEach(function(el) {
    if (el.dataset.dept === key) el.classList.remove('hidden-soft');
    else el.classList.add('hidden-soft');
  });
}

// ============================================================
// ACTIONS
// ============================================================
function deleteKpi(dept, idx)        { state.departments[dept].kpis.splice(idx, 1); save(); rerenderDept(dept); }
function addKpi(dept)                { state.departments[dept].kpis.push({ id: uid("k"), label: "Nuevo KPI", value: "0", delta: "+0%", trend: "up" }); save(); rerenderDept(dept); }
function toggleTrend(dept, idx)      { var k = state.departments[dept].kpis[idx]; k.trend = k.trend === "up" ? "down" : "up"; save(); rerenderDept(dept); }
function deleteSection(dept, idx)    {
  state.departments[dept].sections.splice(idx, 1);
  state.departments[dept].sections.forEach(function(s, i) { s.number = pad2(i + 1); });
  save(); rerenderDept(dept);
}
function addSection(dept)            {
  var n = pad2(state.departments[dept].sections.length + 1);
  state.departments[dept].sections.push({ id: uid("s"), number: n, title: "Nueva sección", content: "Descripción…", items: [] });
  save(); rerenderDept(dept);
}
function addItem(dept, sIdx)         { state.departments[dept].sections[sIdx].items.push({ id: uid("i"), status: "progress", text: "Nuevo punto…" }); save(); rerenderDept(dept); }
function deleteItem(dept, sIdx, iIdx){ state.departments[dept].sections[sIdx].items.splice(iIdx, 1); save(); rerenderDept(dept); }
function changeStatus(dept, sIdx, iIdx, v) { state.departments[dept].sections[sIdx].items[iIdx].status = v; save(); rerenderDept(dept); }

// FUNNEL ACTIONS
function addFunnel(dept) {
  state.departments[dept].funnel = {
    stages: [
      { id: uid("f"), name: "Demo solicitada", volume: 100 },
      { id: uid("f"), name: "Cerrado ganado", volume: 0 }
    ],
    totalValue: "€0"
  };
  save(); rerenderDept(dept);
}
function addFunnelStage(dept) {
  if (!state.departments[dept].funnel) addFunnel(dept);
  state.departments[dept].funnel.stages.push({ id: uid("f"), name: "Nueva etapa", volume: 0 });
  save(); rerenderDept(dept);
}
function deleteFunnelStage(dept, idx) {
  state.departments[dept].funnel.stages.splice(idx, 1);
  save(); rerenderDept(dept);
}

function addDept() {
  var key = uid("dept");
  var num = pad2(state.deptOrder.length + 1);
  state.departments[key] = {
    name: "Nueva área", number: num,
    kpis: [{ id: uid("k"), label: "KPI", value: "0", delta: "+0%", trend: "up" }],
    sections: [{ id: uid("s"), number: "01", title: "Resumen", content: "Descripción…", items: [] }]
  };
  state.deptOrder.push(key);
  state.activeDept = key;
  save(); rerenderTabs(); rerenderDeptArea();
}
function deleteDept(key) {
  if (state.deptOrder.length <= 1) return;
  if (!confirm("¿Eliminar el área '" + state.departments[key].name + "' y todos sus datos?")) return;
  delete state.departments[key];
  state.deptOrder = state.deptOrder.filter(function(k) { return k !== key; });
  state.deptOrder.forEach(function(k, i) { state.departments[k].number = pad2(i + 1); });
  if (state.activeDept === key) state.activeDept = state.deptOrder[0];
  save(); rerenderTabs(); rerenderDeptArea();
}

function resetAll() {
  if (!confirm("¿Restablecer todos los datos al estado por defecto? Esta acción no se puede deshacer.")) return;
  state = defaultData();
  save(); renderDashboard();
}

// ============================================================
// EXPORT PDF
// ============================================================
function exportPDF() {
  // Fallback si la librería no cargó (CDN bloqueado, etc.)
  if (typeof html2pdf === 'undefined') {
    window.print();
    return;
  }

  var btn = document.querySelector('[data-action="print"]');
  var originalHTML = btn ? btn.innerHTML : '';
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = ICON.print + '<span class="hidden sm:inline">Generando…</span>';
  }

  var scrollY = window.scrollY;
  document.body.classList.add('exporting');
  window.scrollTo(0, 0);

  // Esperar al re-layout antes de capturar
  setTimeout(function() {
    var element = document.getElementById('root');
    var fileName = 'weekly-review-' + new Date().toISOString().slice(0, 10) + '.pdf';

    html2pdf().set({
      margin:      [10, 12, 10, 12],
      filename:    fileName,
      image:       { type: 'jpeg', quality: 0.95 },
      html2canvas: { scale: 2, useCORS: true, logging: false, windowWidth: 1400 },
      jsPDF:       { unit: 'mm', format: 'a4', orientation: 'landscape', compress: true },
      pagebreak:   { mode: ['css', 'legacy'] }
    }).from(element).save().then(function() {
      document.body.classList.remove('exporting');
      window.scrollTo(0, scrollY);
      if (btn) { btn.disabled = false; btn.innerHTML = originalHTML; }
    }).catch(function(err) {
      document.body.classList.remove('exporting');
      window.scrollTo(0, scrollY);
      if (btn) { btn.disabled = false; btn.innerHTML = originalHTML; }
      alert('Error al generar el PDF: ' + (err.message || err));
    });
  }, 150);
}

// ============================================================
// EVENT DELEGATION
// ============================================================
var eventsAttached = false;
function attachEvents() {
  if (eventsAttached) return;
  eventsAttached = true;
  var root = $('#root');

  root.addEventListener('click', function(e) {
    var btn = e.target.closest('[data-action]');
    if (!btn || btn.tagName === 'SELECT') return;
    var action = btn.dataset.action;

    // Tab switching: funciona aunque clic sea sobre un editable.
    // Si la pestaña ya está activa, dejamos pasar (edición inline).
    if (action === 'set-tab') {
      var tabKey = btn.dataset.tab;
      if (state.activeDept !== tabKey) {
        if (document.activeElement && typeof document.activeElement.blur === 'function') {
          document.activeElement.blur();
        }
        setActiveDept(tabKey);
      }
      return;
    }

    // Para el resto de acciones, ignorar clics sobre contenteditable
    if (e.target.closest('[contenteditable="true"]')) return;

    var dept = btn.dataset.dept;
    var idx = parseInt(btn.dataset.idx);
    var sIdx = parseInt(btn.dataset.sectionIdx);
    var iIdx = parseInt(btn.dataset.itemIdx);

    switch (action) {
      case 'delete-kpi':         deleteKpi(dept, idx); break;
      case 'add-kpi':            addKpi(dept); break;
      case 'toggle-trend':       toggleTrend(dept, idx); break;
      case 'delete-section':     deleteSection(dept, idx); break;
      case 'add-section':        addSection(dept); break;
      case 'add-item':           addItem(dept, idx); break;
      case 'delete-item':        deleteItem(dept, sIdx, iIdx); break;
      case 'add-funnel':         addFunnel(dept); break;
      case 'add-funnel-stage':   addFunnelStage(dept); break;
      case 'delete-funnel-stage':deleteFunnelStage(dept, idx); break;
      case 'add-dept':           addDept(); break;
      case 'delete-dept':        deleteDept(btn.dataset.key); break;
      case 'print':              exportPDF(); break;
      case 'logout':             logout(); break;
      case 'reset':              resetAll(); break;
    }
  });

  root.addEventListener('change', function(e) {
    var sel = e.target.closest('[data-action="status-change"]');
    if (!sel) return;
    changeStatus(sel.dataset.dept, parseInt(sel.dataset.sectionIdx), parseInt(sel.dataset.itemIdx), sel.value);
  });

  root.addEventListener('blur', function(e) {
    var el = e.target.closest('[data-edit]');
    if (!el) return;
    var path = el.dataset.edit;
    var value = el.innerText.trim();

    // Numeric fields (funnel volumes)
    if (el.dataset.numeric === "1" || /\.funnel\.stages\.\d+\.volume$/.test(path)) {
      value = parseInt(String(value).replace(/[^0-9-]/g, '')) || 0;
    }

    setStateAt(path, value);

    // Recompute funnel percentages on edit
    if (path.indexOf('.funnel.') !== -1) {
      var m = path.match(/^departments\.([^.]+)\./);
      if (m) rerenderDept(m[1]);
    }
  }, true);

  root.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.matches && e.target.matches('span[data-edit]')) {
      e.preventDefault();
      e.target.blur();
    }
  });

  root.addEventListener('dragstart', dragStart);
  root.addEventListener('dragover', dragOver);
  root.addEventListener('drop', dropHandler);
  root.addEventListener('dragend', dragEnd);
}

// ============================================================
// ROOT
// ============================================================
function renderRoot() {
  if (!isAuthed()) {
    renderLogin();
  } else {
    renderDashboard();
    attachEvents();
  }
}

window.__appLoaded = true;
renderRoot();
</script>
