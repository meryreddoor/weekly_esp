function confirmDestructive() {
  if (!pendingDestructiveAction) return;
  var input = $('#destructive-pwd');
  var errEl = $('#destructive-error');
  if (!input) return;
  var clean = String(input.value || '').trim().toLowerCase().replace(/\s+/g, '');
  var expected = String(pendingDestructiveAction.password || '').toLowerCase();
  if (clean !== expected) {
    errEl.classList.remove('hidden-soft'); errEl.classList.add('flex');
    input.classList.add('border-rose-300'); input.classList.remove('border-slate-200');
    input.value = '';

      if (input) { input.classList.remove('border-rose-300'); input.classList.add('border-slate-200'); input.focus(); }
    }, 2200);
    return;
  }
  var fn = pendingDestructiveAction.onConfirm;
  pendingDestructiveAction = null;
  closeModal();
  if (typeof fn === 'function') fn();
}

function $(sel)  { return document.querySelector(sel); }
function $$(sel) { return Array.prototype.slice.call(document.querySelectorAll(sel)); }
function escapeHTML(str) {
  return String(str == null ? "" : str).replace(/[&<>"']/g, function(m) {
    return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[m];
  });
}
function getWeekNumber(date) {
  var d = date || new Date();

  return Math.ceil(((d - yearStart) / 86400000 + yearStart.getDay() + 1) / 7);
}
function uid(p) { return p + "_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6); }

function pct(num, denom) {
  if (!denom || denom <= 0) return '—';
  return Math.round((num / denom) * 100) + '%';
}
function formatDate(ts) {
  var d = new Date(ts);

function formatDateTime(ts) {
  var d = new Date(ts);

// ============================================================
// JSONBIN API LAYER
// ============================================================
var syncStatus = 'idle'; // 'idle' | 'syncing' | 'error' | 'offline'
var lastSyncAt = null;
var pendingSync = false;
var syncDebounceTimer = null;

function jbHeaders() {
  return {
    'Content-Type': 'application/json',
    'X-Master-Key': JSONBIN_KEY,
    'X-Bin-Versioning': 'false'
  };
}

function jbCreateBin(payload, name) {
  return fetch(JSONBIN_API + '/b', {
    method: 'POST',
    headers: Object.assign({}, jbHeaders(), { 'X-Bin-Name': name, 'X-Bin-Private': 'true' }),
    body: JSON.stringify(payload)
  }).then(function(r) {
    if (!r.ok) throw new Error('JSONBin create failed: ' + r.status);
    return r.json();
  });
}

function jbReadBin(binId) {
  return fetch(JSONBIN_API + '/b/' + binId + '/latest', {
    method: 'GET',
    headers: jbHeaders()
  }).then(function(r) {
    if (!r.ok) throw new Error('JSONBin read failed: ' + r.status);
    return r.json();
  });
}

function jbUpdateBin(binId, payload) {
  return fetch(JSONBIN_API + '/b/' + binId, {
    method: 'PUT',
    headers: jbHeaders(),
    body: JSON.stringify(payload)
  }).then(function(r) {
    if (!r.ok) throw new Error('JSONBin update failed: ' + r.status);
    return r.json();
  });
}

// Como los bins son fijos y compartidos, no hay nada que crear.
// Solo nos aseguramos de que tienen contenido inicial si están vacíos.
function ensureBins() {
  // Comprobar que el bin de state tiene datos. Si está vacío (data: null), subir los datos actuales.
  return jbReadBin(binIds.state).then(function(res) {
    var record = res.record;
    if (!record || !record.data || !record.data.departments) {
      // Bin vacío → subir nuestros datos locales como semilla compartida
      return jbUpdateBin(binIds.state, {
        data: state,
        lastAuthor: getUser(),
        updatedAt: Date.now()
      });
    }
  }).catch(function(err) {
    console.warn('ensureBins state check failed:', err);
  });
}

function setSyncStatus(status, msg) {
  syncStatus = status;
  var el = $('#sync-status');
  if (!el) return;
  var dotColor, label;
  switch (status) {
    case 'syncing': dotColor = 'bg-amber-500 pulse-dot'; label = 'Sincronizando…'; break;
    case 'error':   dotColor = 'bg-rose-500';            label = 'Error de sync'; break;
    case 'offline': dotColor = 'bg-slate-400';            label = 'Sin conexión'; break;
    default:        dotColor = 'bg-emerald-500';          label = lastSyncAt ? ('Sincronizado · ' + relativeTime(lastSyncAt)) : 'En la nube';
  }
  el.innerHTML = '<div class="w-1.5 h-1.5 rounded-full ' + dotColor + '"></div><span title="' + (msg || '') + '">' + label + '</span>';
}

function relativeTime(ts) {
  var diff = Date.now() - ts;
  if (diff < 30000) return 'ahora';
  if (diff < 60000) return 'hace <1m';
  var m = Math.floor(diff / 60000);
  if (m < 60) return 'hace ' + m + 'm';
  var h = Math.floor(m / 60);
  if (h < 24) return 'hace ' + h + 'h';
  return formatDateTime(ts);
}

// PULL: trae estado del servidor y reemplaza local (con confirmación si hay cambios externos)
function syncPull(silent) {
  if (!binIds.state) return Promise.resolve();
  setSyncStatus('syncing');
  return jbReadBin(binIds.state).then(function(res) {
    var record = res.record;
    if (record && record.data && record.data.departments) {
      state = record.data;
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
      lastSyncAt = Date.now();
      if (record.lastAuthor) state.__lastAuthor = record.lastAuthor;
      if (record.updatedAt)  state.__updatedAt = record.updatedAt;
    }
    setSyncStatus('idle');
    if (!silent) {
      renderDashboard();
      showToast('Sincronizado · última edición por ' + (record.lastAuthor || '?'));
    }
    return record;
  }).catch(function(err) {
    setSyncStatus('error', err.message);
    if (!silent) showToast('Error al sincronizar: ' + err.message);
  });
}

// PUSH: empuja el estado local al servidor (debounced)
function syncPushDebounced() {
  pendingSync = true;
  setSyncStatus('syncing');
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(function() {
    syncPushNow();
  }, 1500);
}

function syncPushNow() {
  if (!binIds.state) {
    return ensureBins().then(syncPushNow);
  }
  pendingSync = false;
  return jbUpdateBin(binIds.state, {
    data: state,
    lastAuthor: getUser(),
    updatedAt: Date.now()
  }).then(function() {
    lastSyncAt = Date.now();
    setSyncStatus('idle');
  }).catch(function(err) {
    setSyncStatus('error', err.message);
  });
}

function syncSnapshotsPush() {
  if (!binIds.snapshots) return ensureBins().then(syncSnapshotsPush);
  return jbUpdateBin(binIds.snapshots, { snapshots: loadSnapshotsLocal() })
    .catch(function(err) { console.warn('Snapshot sync failed:', err); });
}

function syncSnapshotsPull() {
  if (!binIds.snapshots) return Promise.resolve();
  return jbReadBin(binIds.snapshots).then(function(res) {
    if (res.record && Array.isArray(res.record.snapshots)) {
      try { localStorage.setItem(SNAPSHOTS_KEY, JSON.stringify(res.record.snapshots)); } catch (e) {}
    }
  }).catch(function(err) { console.warn('Snapshot pull failed:', err); });
}

function migrateState(s) {
  if (!s || !s.departments) return s;
  if (s.departments.ventas && !s.departments.ventas.funnel) {
    s.departments.ventas.funnel = {
      stages: [
        { id: uid("f"), name: "Demo solicitada",   volume: 100 },

        { id: uid("f"), name: "Cerrado ganado",    volume: 13 }
      ],
      totalValue: "€37.8K"
    };
  }
  return s;
}

var state;
try {
  var raw = localStorage.getItem(STORAGE_KEY);
  state = (raw && JSON.parse(raw)) || defaultData();
  if (!state.departments || !state.deptOrder) state = defaultData();
  state = migrateState(state);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
} catch (e) { state = defaultData(); }

var saveTimer = null;
function save() {
  setSaveStatus(false);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    setSaveStatus(true);
    syncPushDebounced();
  }, 600);
}
function setSaveStatus(saved) {
  var el = $('#save-status');
  if (!el) return;
  el.innerHTML = saved
    ? '<div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div><span>Guardado</span>'
    : '<div class="w-1.5 h-1.5 rounded-full bg-amber-500 pulse-dot"></div><span>Guardando…</span>';
}
function setStateAt(path, value) {
  var parts = path.split('.');
  var target = state;
  for (var i = 0; i < parts.length - 1; i++) {
    var key = isNaN(parts[i]) ? parts[i] : parseInt(parts[i]);
    target = target[key];
  }
  var lastKey = isNaN(parts[parts.length - 1]) ? parts[parts.length - 1] : parseInt(parts[parts.length - 1]);
  target[lastKey] = value;
  save();
}

function loadSnapshotsLocal() {
  try {
    var raw = localStorage.getItem(SNAPSHOTS_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}
function loadSnapshots() {
  return loadSnapshotsLocal();
}
function saveSnapshots(arr) {
  try { localStorage.setItem(SNAPSHOTS_KEY, JSON.stringify(arr)); return true; } catch (e) { return false; }
}
function createSnapshot(label) {
  var snapshots = loadSnapshots();
  var snap = {
    id: uid("snap"),
    label: label || state.weekLabel,
    createdAt: Date.now(),
    author: getUser(),
    data: deepClone(state)
  };
  snapshots.unshift(snap);
  saveSnapshots(snapshots);
  syncSnapshotsPush();
  return snap;
}
function deleteSnapshot(id) {
  var snapshots = loadSnapshots().filter(function(s) { return s.id !== id; });
  saveSnapshots(snapshots);
  syncSnapshotsPush();
}
function restoreSnapshot(id) {
  var snap = loadSnapshots().find(function(s) { return s.id === id; });
  if (!snap) return false;
  state = deepClone(snap.data);
  save();
  renderDashboard();
  return true;
}
function exportSnapshotJSON(id) {
  var snap = loadSnapshots().find(function(s) { return s.id === id; });
  if (!snap) return;
  var blob = new Blob([JSON.stringify(snap, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'wbr-' + snap.label.replace(/[^a-z0-9]+/gi, '-').toLowerCase() + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

var memSession = false;
function isAuthed() {
  if (memSession) return true;
  try {
    var s = localStorage.getItem(SESSION_KEY);
    if (!s) return false;
    var parsed = JSON.parse(s);
    var valid = Date.now() - parsed.ts < 30 * 24 * 60 * 60 * 1000;
    if (valid) memSession = true;
    return valid;
  } catch (e) { return false; }
}
function authenticate(pwd) {
  var clean = String(pwd || "").trim().toLowerCase().replace(/\s+/g, "");
  if (clean !== PASSWORD.toLowerCase()) return false;
  memSession = true;
  try { localStorage.setItem(SESSION_KEY, JSON.stringify({ ts: Date.now() })); } catch (e) {}
  return true;
}
function logout() {
  memSession = false;
  try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
  renderRoot();
}

function getUser() {
  try { return localStorage.getItem(USER_KEY) || 'Anónimo'; } catch (e) { return 'Anónimo'; }
}

  try { localStorage.setItem(USER_KEY, name); } catch (e) {}
}
function hasUser() {
  try { return !!localStorage.getItem(USER_KEY); } catch (e) { return false; }
}
function clearUser() {

function userInitials(name) {

}

// ============================================================
// DRAG & DROP
// ============================================================
var dragInfo = null, lastDropTarget = null, lastDropPos = null;

function clearAllDropIndicators() {
  $$('.drop-above, .drop-below, .drop-left, .drop-right').forEach(function(el) {
    el.classList.remove('drop-above', 'drop-below', 'drop-left', 'drop-right');
  });
}
function dragStart(e) {
  var item = e.target.closest('[data-drag-type]');
  if (!item) return;
  if (e.target.closest('[contenteditable="true"]')) { e.preventDefault(); return; }
  dragInfo = {
    type: item.dataset.dragType,
    dept: item.dataset.dept || null,
    idx: item.dataset.dragIdx != null ? parseInt(item.dataset.dragIdx) : null,
    sIdx: item.dataset.dragSIdx != null ? parseInt(item.dataset.dragSIdx) : null,
    iIdx: item.dataset.dragIIdx != null ? parseInt(item.dataset.dragIIdx) : null,
    key: item.dataset.dragKey || null
  };
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', dragInfo.type); } catch (err) {}
  setTimeout(function() { item.classList.add('dragging'); }, 0);
}
function dragOver(e) {
  if (!dragInfo) return;
  var item = e.target.closest('[data-drag-type="' + dragInfo.type + '"]');
  if (!item) return;
  if (item.classList.contains('dragging')) return;
  if (dragInfo.type !== 'tab' && item.dataset.dept !== dragInfo.dept) return;
  if (dragInfo.type === 'item' && parseInt(item.dataset.dragSIdx) !== dragInfo.sIdx) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var rect = item.getBoundingClientRect();
  var horizontal = dragInfo.type === 'tab';
  var pos = horizontal
    ? (e.clientX < (rect.left + rect.width / 2) ? 'left' : 'right')
    : (e.clientY < (rect.top + rect.height / 2) ? 'above' : 'below');
  if (lastDropTarget !== item || lastDropPos !== pos) {
    if (lastDropTarget) lastDropTarget.classList.remove('drop-above','drop-below','drop-left','drop-right');
    item.classList.add('drop-' + pos);
    lastDropTarget = item;
    lastDropPos = pos;
  }
}
function dropHandler(e) {
  if (!dragInfo || !lastDropTarget) { dragEnd(); return; }
  e.preventDefault();
  var target = lastDropTarget;
  var pos = lastDropPos;
  switch (dragInfo.type) {
    case 'tab':           reorderTabs(dragInfo.key, target.dataset.dragKey, pos); break;
    case 'kpi':           reorderKpis(dragInfo.dept, dragInfo.idx, parseInt(target.dataset.dragIdx), pos); break;
    case 'section':       reorderSections(dragInfo.dept, dragInfo.idx, parseInt(target.dataset.dragIdx), pos); break;
    case 'item':          reorderItems(dragInfo.dept, dragInfo.sIdx, dragInfo.iIdx, parseInt(target.dataset.dragIIdx), pos); break;
    case 'funnel-stage':  reorderFunnelStages(dragInfo.dept, dragInfo.idx, parseInt(target.dataset.dragIdx), pos); break;
  }
  dragEnd();
}
function dragEnd() {
  $$('.dragging').forEach(function(el) { el.classList.remove('dragging'); });
  clearAllDropIndicators();
  dragInfo = null; lastDropTarget = null; lastDropPos = null;
}
function reorderArrayMove(arr, fromIdx, toIdx, pos) {
  if (fromIdx === toIdx) return;
  var item = arr[fromIdx];
  arr.splice(fromIdx, 1);
  if (pos === 'below' || pos === 'right') toIdx++;
  if (fromIdx < toIdx) toIdx--;
  arr.splice(toIdx, 0, item);
}
function reorderTabs(srcKey, targetKey, pos) {
  if (srcKey === targetKey) return;
  reorderArrayMove(state.deptOrder, state.deptOrder.indexOf(srcKey), state.deptOrder.indexOf(targetKey), pos);
  state.deptOrder.forEach(function(key, i) { state.departments[key].number = pad2(i + 1); });
  save(); rerenderTabs();
}
function reorderKpis(dept, fromIdx, toIdx, pos) {
  reorderArrayMove(state.departments[dept].kpis, fromIdx, toIdx, pos);
  save(); rerenderDept(dept);
}
function reorderSections(dept, fromIdx, toIdx, pos) {
  reorderArrayMove(state.departments[dept].sections, fromIdx, toIdx, pos);
  state.departments[dept].sections.forEach(function(s, i) { s.number = pad2(i + 1); });
  save(); rerenderDept(dept);
}
function reorderItems(dept, sIdx, fromIdx, toIdx, pos) {
  reorderArrayMove(state.departments[dept].sections[sIdx].items, fromIdx, toIdx, pos);
  save(); rerenderDept(dept);
}
function reorderFunnelStages(dept, fromIdx, toIdx, pos) {
  reorderArrayMove(state.departments[dept].funnel.stages, fromIdx, toIdx, pos);
  save(); rerenderDept(dept);
}

function renderSection(section, idx, dept) {

function renderFunnel(dept) {
  var f = state.departments[dept].funnel;
  if (!f || !f.stages) return '';
  var first = f.stages[0], last = f.stages[f.stages.length - 1];
  var rowsHTML = f.stages.map(function(stage, i) {
    var prev = i > 0 ? f.stages[i - 1] : null;
    var vsAnt = (i === 0) ? '—' : pct(stage.volume, prev.volume);
    var vsTop = (i === 0) ? '—' : pct(stage.volume, first.volume);
    var prefix = 'departments.' + dept + '.funnel.stages.' + i;
    return '' +
      '<div draggable="true" data-drag-type="funnel-stage" data-dept="' + dept + '" data-drag-idx="' + i + '" class="group/stage px-6 py-3 grid grid-cols-12 gap-4 items-center border-b border-slate-100 last:border-0">' +
        '<div class="col-span-6 flex items-center gap-2 -ml-1">' +
          '<span class="drag-handle no-print text-slate-400">' + ICON.grip + '</span>' +

        '</div>' +
        '<div class="col-span-2 text-right"><span contenteditable="true" data-edit="' + prefix + '.volume" data-numeric="1" class="text-base font-semibold text-slate-900 cursor-text px-1 -mx-1 inline-block">' + escapeHTML(String(stage.volume)) + '</span></div>' +

          '<button data-action="delete-funnel-stage" data-dept="' + dept + '" data-idx="' + i + '" class="opacity-0 group-hover/stage:opacity-100 text-slate-300 hover:text-rose-500 no-print">' + ICON.trash + '</button>' +
        '</div>' +
      '</div>';
  }).join('');
  var globalConv = first ? pct(last.volume, first.volume) : '—';
  return '' +
    '<div class="max-w-5xl mx-auto px-6 pt-2 pb-6">' +
      '<div class="flex items-center justify-between mb-3">' +
        '<h3 class="text-[11px] uppercase tracking-[0.2em] text-slate-400 font-medium">Pipeline comercial</h3>' +

        '</div>' + rowsHTML +

          '<div class="col-span-8 text-[11px] uppercase tracking-widest text-slate-400">Valor total pipeline</div>' +
          '<div class="col-span-4 text-right"><span contenteditable="true" data-edit="departments.' + dept + '.funnel.totalValue" class="text-base font-semibold text-slate-900 cursor-text px-1 -mx-1 inline-block">' + escapeHTML(f.totalValue) + '</span></div>' +

    var trendArrow = kpi.trend === "up" ? "▲" : "▼";
    return '' +
      '<div style="flex:1;min-width:0;background:white;border:1px solid #e2e8f0;border-radius:12px;padding:16px 20px;">' +

      '</div>';
  }).join('');

          '<div style="text-align:right;color:#94a3b8;">' + vsTop + '</div>' +
        '</div>';
    }).join('');
    funnelHTML = '' +
      '<div style="margin-bottom:14px;">' +
        '<div style="font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.2em;margin-bottom:6px;">Pipeline comercial</div>' +

            '<div style="text-align:right;font-weight:600;color:#059669;font-size:13px;">' + globalConv + '</div>' +
          '</div>' +
        '</div>' +
      '</div>';

function exportPDF() {
  if (typeof html2canvas === 'undefined' || typeof window.jspdf === 'undefined') {
    alert('No se pudieron cargar las librerías de PDF. Comprueba tu conexión.');
    return;
  }

  var btn = document.querySelector('[data-action="print"]');
  var originalHTML = btn ? btn.innerHTML : '';
  if (btn) { btn.disabled = true; btn.innerHTML = ICON.print + '<span class="hidden sm:inline">Generando…</span>'; }

  // Construir páginas en stage off-screen
  var stage = $('#pdf-stage');
  var pagesHTML = buildPdfPageCover();
  state.deptOrder.forEach(function(deptKey) { pagesHTML += buildPdfPageDept(deptKey); });
  stage.innerHTML = pagesHTML;

  setTimeout(function() {
    var pages = stage.querySelectorAll('.pdf-page');
    var jsPDF = window.jspdf.jsPDF;
    var pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4', compress: true });

    var renderPromises = Array.prototype.map.call(pages, function(page) {
      return html2canvas(page, { scale: 2, useCORS: true, logging: false, backgroundColor: '#ffffff', windowWidth: 1123, windowHeight: 794 });
    });

    Promise.all(renderPromises).then(function(canvases) {
      canvases.forEach(function(canvas, i) {
        var imgData = canvas.toDataURL('image/jpeg', 0.95);
        if (i > 0) pdf.addPage('a4', 'landscape');
        pdf.addImage(imgData, 'JPEG', 0, 0, 297, 210, undefined, 'FAST');
      });
      var fileName = 'WBR-' + (state.weekLabel || 'export').replace(/[^a-z0-9]+/gi, '-').toLowerCase() + '.pdf';
      pdf.save(fileName);
      stage.innerHTML = '';
      if (btn) { btn.disabled = false; btn.innerHTML = originalHTML; }
    }).catch(function(err) {
      stage.innerHTML = '';
      if (btn) { btn.disabled = false; btn.innerHTML = originalHTML; }
      alert('Error al generar el PDF: ' + (err.message || err));
    });
  }, 200);
}

  t.textContent = msg;

function importSnapshotJSON() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json';
  input.onchange = function(e) {
    var f = e.target.files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function() {
      try {
        var snap = JSON.parse(reader.result);
        if (!snap.data || !snap.data.departments) throw new Error('Formato no válido');
        var snapshots = loadSnapshots();
        snap.id = uid("snap"); // nuevo id para evitar colisiones
        snapshots.unshift(snap);
        saveSnapshots(snapshots);
        showToast('Versión importada');
        openSnapshotListModal();
      } catch (err) {
        alert('Error al importar: ' + err.message);
      }
    };
    reader.readAsText(f);
  };
  input.click();
}

var eventsAttached = false;
function attachEvents() {
  if (eventsAttached) return;
  eventsAttached = true;
  var root = document.body;

  root.addEventListener('click', function(e) {
    var btn = e.target.closest('[data-action]');

    // Cerrar dropdown si se hace click fuera
    var insideWeekSelector = e.target.closest('#week-selector-wrap');
    if (!insideWeekSelector) {
      var dd = $('#week-dropdown');
      if (dd && !dd.classList.contains('hidden-soft')) dd.classList.add('hidden-soft');
    }

    // Si el click es sobre el contenteditable de la fecha, NO abrir dropdown
    if (e.target.closest('[data-stop-toggle="1"]')) {
      // Permitir edición normal, pero no propagar al toggle
      return;
    }

    if (!btn || btn.tagName === 'SELECT') return;
    var action = btn.dataset.action;

    if (action === 'set-tab') {
      var tabKey = btn.dataset.tab;
      if (state.activeDept !== tabKey) {
        if (document.activeElement && typeof document.activeElement.blur === 'function') document.activeElement.blur();
        setActiveDept(tabKey);
      }
      return;
    }

    if (e.target.closest('[contenteditable="true"]')) return;

    var dept = btn.dataset.dept;
    var idx = parseInt(btn.dataset.idx);
    var sIdx = parseInt(btn.dataset.sectionIdx);
    var iIdx = parseInt(btn.dataset.itemIdx);
    var snapId = btn.dataset.id;

    switch (action) {
      case 'delete-kpi':         deleteKpi(dept, idx); break;
      case 'add-kpi':            addKpi(dept); break;
      case 'toggle-trend':       toggleTrend(dept, idx); break;
      case 'toggle-sentiment':   toggleSentiment(dept, idx); break;
      case 'set-sentiment':      setSentiment(dept, idx, btn.dataset.sentiment); break;
      case 'delete-section':     deleteSection(dept, idx); break;
      case 'add-section':        addSection(dept); break;
      case 'add-item':           addItem(dept, idx); break;
      case 'delete-item':        deleteItem(dept, sIdx, iIdx); break;
      case 'add-funnel':         addFunnel(dept); break;
      case 'add-funnel-stage':   addFunnelStage(dept); break;
      case 'delete-funnel-stage':deleteFunnelStage(dept, idx); break;
      case 'add-dept':           addDept(); break;
      case 'delete-dept':        deleteDept(btn.dataset.key); break;
      case 'print':              exportPDF(); break;
      case 'logout':             logout(); break;
      case 'confirm-destructive': confirmDestructive(); break;
      case 'change-user':
        if (confirm('¿Cambiar tu nombre de usuario? Solo afecta a tu navegador.')) { clearUser(); renderRoot(); }
        break;
      case 'sync-pull':          syncPull(false); break;
      case 'reset':              resetAll(); break;
      case 'confirm-reset':      confirmReset(); break;
      case 'snapshot-save':      toggleWeekDropdown(false); openSnapshotSaveModal(); break;
      case 'snapshot-confirm-save': confirmSnapshotSave(); break;
      case 'snapshot-list':      toggleWeekDropdown(false); openSnapshotListModal(); break;
      case 'snapshot-restore-quick': restoreSnapshotQuick(snapId); break;
      case 'toggle-week-dropdown': toggleWeekDropdown(); break;
      case 'snapshot-restore':
        var snapToRestore = loadSnapshots().find(function(s) { return s.id === snapId; });
        openDestructiveModal({
          title: 'Restaurar versión',
          description: 'Vas a sobreescribir <strong>todos los datos actuales</strong> con la versión <strong>"' + (snapToRestore ? escapeHTML(snapToRestore.label) : '') + '"</strong>. Los cambios actuales se perderán salvo que guardes una versión antes.',
          confirmLabel: 'Restaurar',
          password: DELETE_PASSWORD,
          onConfirm: function() {
            restoreSnapshot(snapId); closeModal(); showToast('Versión restaurada');
          }
        });
        break;
      case 'snapshot-delete':
        var snapToDelete = loadSnapshots().find(function(s) { return s.id === snapId; });
        openDestructiveModal({
          title: 'Eliminar versión',
          description: 'Vas a eliminar el snapshot <strong>"' + (snapToDelete ? escapeHTML(snapToDelete.label) : '') + '"</strong> definitivamente. Esta acción no se puede deshacer.',
          confirmLabel: 'Eliminar versión',
          password: DELETE_PASSWORD,
          onConfirm: function() {
            deleteSnapshot(snapId); openSnapshotListModal(); showToast('Versión eliminada');
          }
        });
        break;
      case 'snapshot-export':    exportSnapshotJSON(snapId); break;
      case 'snapshot-import':    importSnapshotJSON(); break;
      case 'modal-close':        closeModal(); break;
    }
  });

  root.addEventListener('change', function(e) {
    var sel = e.target.closest('[data-action="status-change"]');
    if (!sel) return;
    changeStatus(sel.dataset.dept, parseInt(sel.dataset.sectionIdx), parseInt(sel.dataset.itemIdx), sel.value);
  });

  root.addEventListener('blur', function(e) {
    var el = e.target.closest('[data-edit]');
    if (!el) return;
    var path = el.dataset.edit;
    var value = el.innerText.trim();
    if (el.dataset.numeric === "1" || /\.funnel\.stages\.\d+\.volume$/.test(path)) {
      value = parseInt(String(value).replace(/[^0-9-]/g, '')) || 0;
    }
    setStateAt(path, value);
    if (path.indexOf('.funnel.') !== -1) {
      var m = path.match(/^departments\.([^.]+)\./);
      if (m) rerenderDept(m[1]);
    }
  }, true);

  root.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.matches && e.target.matches('span[data-edit]')) {
      e.preventDefault(); e.target.blur();
    }
    if (e.key === 'Enter' && e.target.id === 'reset-pwd') {
      e.preventDefault(); confirmReset();
    }
    if (e.key === 'Enter' && e.target.id === 'destructive-pwd') {
      e.preventDefault(); confirmDestructive();
    }
    if (e.key === 'Escape') closeModal();
  });

  root.addEventListener('dragstart', dragStart);
  root.addEventListener('dragover', dragOver);
  root.addEventListener('drop', dropHandler);
  root.addEventListener('dragend', dragEnd);
}

// ============================================================
// ROOT
// ============================================================
function renderRoot() {
  if (!isAuthed()) { renderLogin(); return; }
  if (!hasUser())  { renderUserOnboarding(); return; }
  renderDashboard();
  attachEvents();

  // Sync inicial: asegurar bins + traer estado del servidor
  ensureBins().then(function() {
    return syncPull(true);
  }).then(function() {
    renderDashboard();
    setSyncStatus('idle');
    syncSnapshotsPull();
  }).catch(function(err) {
    setSyncStatus('error', err.message);
    showToast('Trabajando en local — sin conexión con el servidor');
  });
}
window.__appLoaded = true;
renderRoot();
</script>
</body>
</html>
